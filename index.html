<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="Test how many digits of Pi you know! Type as many digits as you can and see your score."
        />
        <title>Pi Day Counter 🥧</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="index.css" />
    </head>
    <body>
        <div class="bg-orbs">
            <div class="orb orb-1"></div>
            <div class="orb orb-2"></div>
            <div class="orb orb-3"></div>
        </div>

        <main class="container">
            <header class="header">
                <div class="pi-symbol" aria-hidden="true">π</div>
                <h1 class="title">Pi Day Counter</h1>
                <p class="subtitle">How many digits of π do you know?</p>
            </header>

            <section class="card" aria-label="Pi digit entry">
                <label for="pi-input" class="input-label"> Type π </label>
                <div class="input-wrapper">
                    <span class="input-prefix">π =</span>
                    <input
                        id="pi-input"
                        type="text"
                        class="pi-input"
                        placeholder="3.14..."
                        autocomplete="off"
                        autocorrect="off"
                        autocapitalize="off"
                        spellcheck="false"
                        aria-label="Enter digits of pi"
                    />
                </div>

                <div
                    class="result-area"
                    id="result-area"
                    role="region"
                    aria-live="polite"
                    aria-label="Result"
                >
                    <div class="result-idle" id="result-idle">
                        <span class="idle-icon">🥧</span>
                        <span>Click submit to see your score!</span>
                    </div>
                    <div class="result-content" id="result-content" hidden>
                        <div class="score-row">
                            <div class="score-block" id="score-block">
                                <span class="score-number" id="score-number"
                                    >0</span
                                >
                                <span class="score-label">correct digits</span>
                            </div>
                            <div class="status-badge" id="status-badge"></div>
                        </div>
                        <div
                            class="pi-preview"
                            id="pi-preview"
                            aria-label="Digit-by-digit breakdown"
                        ></div>
                    </div>
                </div>
            </section>

            <button class="submit-btn" id="submit-btn" aria-label="Submit">
                <span class="submit-icon">↺</span> Submit
            </button>
        </main>

        <script src="index.js"></script>
    </body>
</html>
